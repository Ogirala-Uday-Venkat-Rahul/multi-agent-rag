# Local Postgres + pgvector, for developing against the pgvector backend.
# In production you'd point DATABASE_URL at a Supabase or Neon free-tier instance
# instead of running this.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
